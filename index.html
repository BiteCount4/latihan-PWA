<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#4F46E5" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icons/ICON-1.png" type="image/png" />
<title>PWA Template Responsif</title>
<link rel="stylesheet" href="assets/style.css" />
</head>

<body style="margin:0;font-family:Arial;background:#f5f5f5;">

<!-- HEADER -->
<header style="background:#800000;color:white;padding:15px;">
  <h2>𖹭 KPOP MARKET</h2>

  <input id="searchInput" onkeyup="searchProduct()" placeholder="Cari produk..."
  style="width:100%;padding:10px;border-radius:8px;border:none;margin-top:10px;">
</header>

<!-- MAIN -->
<div style="padding:10px;">

<!-- GRID PRODUK -->
<div style="background:white;padding:10px;border-radius:12px;margin-bottom:10px;">
  <h3>🔥 Produk untuk Pembeli</h3>
  <div id="productList" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;"></div>
</div>

<!-- KERANJANG -->
<div style="background:white;padding:10px;border-radius:12px;margin-bottom:10px;">
  <h3>🛒 Keranjang</h3>
  <ul id="cart"></ul>
</div>

<!-- WISHLIST -->
<div style="background:white;padding:10px;border-radius:12px;margin-bottom:10px;">
  <h3>𖹭 Favorit</h3>
  <ul id="wishlist"></ul>
</div>

</div>

<script>

/* =====================
DATA
===================== */

let produk = [
  { nama:"BTS Photocard Jungkook", harga:200000, kondisi:"Like New", chat:[] },
  { nama:"BLACKPINK Album Lisa", harga:300000, kondisi:"Good", chat:[] }
];

let wishlist = [];
let keranjang = [];

/* =====================
RENDER PRODUK
===================== */

function tampilkanProduk(data = produk){

  const list = document.getElementById("productList");
  list.innerHTML="";

  data.forEach((item,index)=>{

    list.innerHTML+=`
      <div style="background:white;border:1px solid #800000;border-radius:10px;padding:10px;">

        <b>${item.nama}</b><br>
        Rp ${item.harga}<br>
        <small>${item.kondisi}</small><br><br>

        <!-- CHAT DALAM PRODUK -->
        <div style="border:1px solid #ddd;padding:5px;height:60px;overflow:auto;font-size:12px;">
          ${item.chat.map(c=>`💬 ${c}`).join("<br>")}
        </div>

        <input id="chat${index}" placeholder="chat..." style="width:100%;margin-top:5px;">
        <button onclick="chatProduk(${index})">Kirim</button>

        <br>

        <button onclick="beli(${index})">🧾 Beli</button>
        <button onclick="tawar(${index})">💸 Tawar</button>
        <button onclick="addCart(${index})">🛒</button>
        <button onclick="toggleWish('${item.nama}')">𖹭</button>

      </div>
    `;
  });
}

/* =====================
CHAT PER PRODUK
===================== */

function chatProduk(i){
  let input=document.getElementById("chat"+i);
  produk[i].chat.push(input.value);
  input.value="";
  tampilkanProduk();
}

/* =====================
KERANJANG
===================== */

function addCart(i){
  keranjang.push(produk[i].nama);
  renderCart();
}

function renderCart(){
  document.getElementById("cart").innerHTML =
  keranjang.map(c=>`🛒 ${c}`).join("<br>");
}

/* =====================
WISHLIST (FAVORITE + UNFAVORITE)
===================== */

function toggleWish(nama){

  if(wishlist.includes(nama)){
    wishlist = wishlist.filter(w=>w!==nama); // UNFAVORITE
  }else{
    wishlist.push(nama);
  }

  renderWish();
}

function renderWish(){
  document.getElementById("wishlist").innerHTML =
  wishlist.map(w=>`
    <li>
      𖹭 ${w}
      <button onclick="toggleWish('${w}')">hapus</button>
    </li>
  `).join("");
}

/* =====================
FUNGSI ASLI (TETAP DIPERTAHANKAN)
===================== */

function searchProduct(){
  const keyword=document.getElementById("searchInput").value.toLowerCase();
  const hasil=produk.filter(p=>p.nama.toLowerCase().includes(keyword));
  tampilkanProduk(hasil);
}

function tawar(i){
  let p=prompt("Tawar harga:");
  if(p){
    produk[i].chat.push("💸 Tawaran: Rp "+p);
    tampilkanProduk();
  }
}

function beli(i){
  alert("Checkout: "+produk[i].nama);
}

/* INIT */
tampilkanProduk();

</script>

</body>
</html>
