<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#800000" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/ICON-1.png" type="image/png" />
  <title>K-2nd Marketplace</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>

  <style>
    body { font-family:Poppins; margin:0; background:#fff;}
    .header { background:#fff; color:#800000; padding:15px; text-align:center; border-bottom:1px solid #eee;}
    .main { padding:15px;}
    .nav { display:flex; justify-content:space-around; margin-bottom:10px;}
    .card { background:white; border-radius:15px; padding:10px; margin-bottom:15px;}
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:15px;}
    img { width:100%; border-radius:10px;}
    .price { color:#800000; font-weight:bold;}

    button {
      border:none;
      padding:6px 10px;
      border-radius:8px;
      cursor:pointer;
      background:#800000;
      color:white;
    }

    /* LOVE KOSONG */
    .love {
      background:none;
      color:#800000;
      font-size:20px;
    }

    .love::before {
      content:"♡";
    }

    .footer { text-align:center; padding:10px; background:#eee;}
  </style>
</head>

<body>

<header class="header">
  <h1>K-2nd</h1>
  <p>Marketplace Merchandise Kpop Second</p>
</header>

<main class="main">

  <div class="nav">
    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('cart')">Cart</button>
    <button onclick="showPage('fav')">❤️</button>
    <button onclick="showPage('account')">Akun</button>
  </div>

  <input type="text" id="search" placeholder="Cari..." onkeyup="searchProduct()" style="width:100%; padding:10px;">
  <p id="history"></p>

  <section id="home" class="card">
    <h2>Rekomendasi</h2>
    <div class="grid" id="productList"></div>
  </section>

  <section id="detail" class="card" style="display:none;"></section>

  <section id="cart" class="card" style="display:none;">
    <h2>Keranjang</h2>
    <div id="cartList"></div>
    <button onclick="checkout()">Checkout</button>
  </section>

  <section id="fav" class="card" style="display:none;">
    <h2>Favorit</h2>
    <div id="favList"></div>
  </section>

  <section id="account" class="card" style="display:none;">
    <h2>Akun</h2>
    <p>Nama: User K-2nd</p>
    <p>Alamat: Jakarta</p>
    <p>Kontak: 08123456789</p>
  </section>

</main>

<button onclick="alert('tombol testing hidup')">Ini tombol 1</button>

<footer class="footer">
  <p>©️ 2026 K-2nd</p>
</footer>

<script>

/* FUNCTION KAMU (TIDAK DIUBAH) */
const products = [
  {
    name:"Lightstick TREASURE Ver.1",
    price:350000,
    img:"https://i.imgur.com/YW6X7rP.jpg",
    desc:"Original, kondisi 90%"
  },
  {
    name:"Album BTS Love Yourself",
    price:120000,
    img:"https://i.imgur.com/1bX5QH6.jpg",
    desc:"No photocard"
  },
  {
    name:"Photocard BLACKPINK Lisa",
    price:80000,
    img:"https://i.imgur.com/eM6Zx6F.jpg",
    desc:"Original"
  }
];

let cart = [];
let fav = [];
let historySearch = [];

function showPage(page){
  ["home","cart","fav","account","detail"].forEach(id=>{
    document.getElementById(id).style.display="none";
  });
  document.getElementById(page).style.display="block";

  if(page==="cart") renderCart();
  if(page==="fav") renderFav();
}

function renderProducts(list){
  const el = document.getElementById("productList");
  el.innerHTML="";
  list.forEach((p,i)=>{
    el.innerHTML += `
      <div class="card" onclick="showDetail(${i})">
        <img src="${p.img}">
        <h4>${p.name}</h4>
        <p class="price">Rp ${p.price}</p>
        <button class="love" onclick="event.stopPropagation();addFav(${i})"></button>
        <button onclick="event.stopPropagation();addCart(${i})">+Cart</button>
      </div>
    `;
  });
}

function showDetail(i){
  showPage("detail");
  const p = products[i];
  const d = document.getElementById("detail");
  d.innerHTML=`
    <h2>${p.name}</h2>
    <img src="${p.img}">
    <p>${p.desc}</p>
    <p class="price">Rp ${p.price}</p>

    <input id="offer" type="number" placeholder="Tawar harga">
    <button onclick="offerPrice(${p.price})">Tawar</button>

    <br><br>
    <button onclick="addCart(${i})">Masuk Keranjang</button>

    <h3>Chat Penjual</h3>
    <input id="chatInput" placeholder="Ketik pesan...">
    <button onclick="sendChat()">Kirim</button>
    <p id="chatBox"></p>

    <h3>Review</h3>
    <p>⭐️⭐️⭐️⭐️⭐️ Bagus!</p>
  `;
}

function addCart(i){
  cart.push(products[i]);
  alert("Ditambahkan ke keranjang");
}

function addFav(i){
  fav.push(products[i]);
  alert("Ditambahkan ke favorit");
}

function renderCart(){
  const el = document.getElementById("cartList");
  el.innerHTML="";
  cart.forEach(p=>{
    el.innerHTML += `<p>${p.name} - Rp ${p.price}</p>`;
  });
}

function renderFav(){
  const el = document.getElementById("favList");
  el.innerHTML="";
  fav.forEach(p=>{
    el.innerHTML += `<p>${p.name}</p>`;
  });
}

function checkout(){
  alert("Checkout berhasil!");
  cart=[];
  renderCart();
}

function searchProduct(){
  const val = document.getElementById("search").value.toLowerCase();
  historySearch.push(val);
  document.getElementById("history").innerText="History: "+historySearch.join(", ");

  const filtered = products.filter(p=>p.name.toLowerCase().includes(val));
  renderProducts(filtered);
}

function offerPrice(price){
  const offer = document.getElementById("offer").value;
  if(offer >= price*0.7){
    alert("Penawaran diterima!");
  } else {
    alert("Penawaran terlalu rendah!");
  }
}

function sendChat(){
  const msg = document.getElementById("chatInput").value;
  document.getElementById("chatBox").innerText = "Kamu: "+msg+"\nPenjual: Siap kak!";
}

renderProducts(products);

/* SERVICE WORKER TETAP */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js')
    .then(() => console.log('SW registered!'))
    .catch(err => console.error('SW gagal:', err));
}

</script>

</body>
</html>
